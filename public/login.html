<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Dashboard — Sign In</title>
  <link rel="icon" type="image/png" href="black_ops_a.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #e8eaed; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: "Segoe UI", system-ui, sans-serif; }
    .login-card { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); padding: 44px 40px 36px; width: 100%; max-width: 400px; }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .login-logo-text { font-size: 1.15rem; font-weight: 600; color: #1a1a1a; }
    h1 { font-size: 1.5rem; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    .login-subtitle { font-size: 0.9rem; color: #6b7280; margin-bottom: 28px; }
    label { font-size: 0.85rem; font-weight: 500; color: #374151; margin-bottom: 4px; }
    .form-control { border-radius: 2px; border-color: #d1d5db; font-size: 0.95rem; padding: 8px 12px; }
    .form-control:focus { border-color: #0078d4; box-shadow: 0 0 0 2px rgba(0,120,212,0.2); }
    .btn-signin { background: #0078d4; border: none; border-radius: 2px; color: #fff; font-size: 0.95rem; font-weight: 500; padding: 9px; width: 100%; margin-top: 8px; }
    .btn-signin:hover { background: #106ebe; color: #fff; }
    .btn-signin:active { background: #005a9e; color: #fff; }
    .error-msg { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 4px; color: #991b1b; font-size: 0.85rem; padding: 10px 12px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg width="32" height="32" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      <span class="login-logo-text">Queue Dashboard</span>
    </div>

    <h1>Sign in</h1>
    <div class="login-subtitle">Enter your credentials to continue</div>

    <div id="error-msg" class="error-msg" style="display:none">
      Incorrect email or password. Please try again.
    </div>
    <div id="error-not-found" class="error-msg" style="display:none">
      No account found with that email address.
    </div>

    <form id="login-form">
      <!-- Step 1: Email -->
      <div id="step-email">
        <div class="mb-3">
          <label for="email">Email</label>
          <input type="email" class="form-control" id="email" name="email" autocomplete="email" required autofocus>
        </div>
        <div class="form-check mb-2" style="margin-top:4px;">
          <input type="checkbox" class="form-check-input" id="remember-email">
          <label class="form-check-label" for="remember-email" style="font-weight:400; color:#6b7280;">Remember me</label>
        </div>
        <button type="submit" class="btn btn-signin">Next</button>
      </div>

      <!-- Step 2: Password (hidden initially) -->
      <div id="step-password" style="display:none">
        <div class="mb-3">
          <div style="font-size:0.9rem; color:#374151; margin-bottom:12px;">
            Signing in as <strong id="display-email"></strong>
            <a href="#" id="change-email" style="margin-left:8px; font-size:0.8rem;">Change</a>
          </div>
        </div>
        <div class="mb-3">
          <label for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-signin">Sign in</button>
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const stepEmail = document.getElementById('step-email');
    const stepPassword = document.getElementById('step-password');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const displayEmail = document.getElementById('display-email');
    const errorMsg = document.getElementById('error-msg');
    const errorNotFound = document.getElementById('error-not-found');
    const changeEmailLink = document.getElementById('change-email');
    const rememberCheckbox = document.getElementById('remember-email');

    let currentStep = 'email';

    // Restore saved email from localStorage
    const savedEmail = localStorage.getItem('rememberedEmail');
    if (savedEmail) {
      emailInput.value = savedEmail;
      rememberCheckbox.checked = true;
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'sso') {
      errorMsg.textContent = 'This account uses SSO. Please sign in with Microsoft.';
      errorMsg.style.display = 'block';
    } else if (params.get('error')) {
      errorMsg.style.display = 'block';
    }

    function hideErrors() {
      errorMsg.style.display = 'none';
      errorNotFound.style.display = 'none';
    }

    function showStep(step) {
      currentStep = step;
      hideErrors();
      if (step === 'email') {
        stepEmail.style.display = 'block';
        stepPassword.style.display = 'none';
        passwordInput.required = false;
        emailInput.focus();
      } else {
        stepEmail.style.display = 'none';
        stepPassword.style.display = 'block';
        passwordInput.required = true;
        passwordInput.focus();
      }
    }

    changeEmailLink.addEventListener('click', (e) => {
      e.preventDefault();
      showStep('email');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideErrors();

      if (currentStep === 'email') {
        const email = emailInput.value.trim();
        if (!email) return;

        if (rememberCheckbox.checked) {
          localStorage.setItem('rememberedEmail', email);
        } else {
          localStorage.removeItem('rememberedEmail');
        }

        try {
          const res = await fetch('/auth/check-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });

          if (res.status === 404) {
            errorNotFound.style.display = 'block';
            return;
          }

          if (!res.ok) {
            errorMsg.textContent = 'Something went wrong. Please try again.';
            errorMsg.style.display = 'block';
            return;
          }

          const data = await res.json();

          if (data.sso) {
            window.location.href = data.redirectUrl;
          } else {
            displayEmail.textContent = email;
            showStep('password');
          }
        } catch (err) {
          errorMsg.textContent = 'Something went wrong. Please try again.';
          errorMsg.style.display = 'block';
        }
      } else {
        const hiddenForm = document.createElement('form');
        hiddenForm.method = 'POST';
        hiddenForm.action = '/auth/login';

        const emailField = document.createElement('input');
        emailField.type = 'hidden';
        emailField.name = 'email';
        emailField.value = emailInput.value.trim();
        hiddenForm.appendChild(emailField);

        const passField = document.createElement('input');
        passField.type = 'hidden';
        passField.name = 'password';
        passField.value = passwordInput.value;
        hiddenForm.appendChild(passField);

        document.body.appendChild(hiddenForm);
        hiddenForm.submit();
      }
    });
  </script>
</body>
</html>
