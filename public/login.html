<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Dashboard - Sign In</title>
  <link rel="icon" type="image/png" href="black_ops_a.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background-color: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }
    .login-card p {
      color: #9e9e9e;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .btn-microsoft {
      background-color: #2a6496;
      border: none;
      color: #fff;
      padding: 0.65rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .btn-microsoft:hover {
      background-color: #1f4e78;
      color: #fff;
    }
    .ms-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Queue Dashboard</h1>
    <p>Sign in with your Microsoft account to continue</p>
    <a href="/auth/login" class="btn-microsoft">
      <!-- Microsoft logo grid -->
      <svg class="ms-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 21 21">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </a>
  </div>
</body>
</html>
